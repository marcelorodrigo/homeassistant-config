views:
  # ─────────────────────────────────────────────────────────────────────────────
  # Living Room — TP-Link Tapo C210 (pan/tilt)
  # ─────────────────────────────────────────────────────────────────────────────
  - title: Living Room
    path: living-room
    type: sections
    icon: mdi:sofa
    max_columns: 4
    sections:
      # Live stream
      - type: grid
        cards:
          - type: heading
            heading: Living Room Camera
            heading_style: title
            icon: mdi:cctv

          - type: picture-entity
            entity: camera.living_room_camera_hd_stream
            camera_view: live
            show_name: false
            show_state: false
            grid_options:
              columns: full

      # Detections & controls
      - type: grid
        title: Sensors
        cards:
          - type: heading
            heading: Detections
            heading_style: subtitle
            icon: mdi:motion-sensor

          - type: tile
            entity: binary_sensor.living_room_camera_person_detection
            name: Person
            icon: mdi:account
            grid_options:
              columns: 6

          - type: tile
            entity: binary_sensor.living_room_camera_cell_motion_detection
            name: Motion
            icon: mdi:run
            grid_options:
              columns: 6

          - type: tile
            entity: binary_sensor.living_room_camera_noise
            name: Sound
            icon: mdi:volume-high
            grid_options:
              columns: 6

          - type: tile
            entity: binary_sensor.living_room_camera_motion_alarm
            name: Alarm
            icon: mdi:alarm-light
            grid_options:
              columns: 6

          - type: heading
            heading: Controls
            heading_style: subtitle
            icon: mdi:tune

          - type: tile
            entity: switch.living_room_camera_privacy
            name: Privacy
            icon: mdi:eye-off
            grid_options:
              columns: 6

          - type: tile
            entity: light.living_room_camera_floodlight_timed
            name: Floodlight
            icon: mdi:spotlight-beam
            grid_options:
              columns: 6

      # Pan & tilt
      - type: grid
        title: Pan & Tilt
        cards:
          - type: heading
            heading: Pan & Tilt
            heading_style: subtitle
            icon: mdi:pan

          # Row: [empty] [Up] [empty] [empty]
          - type: button
            entity: button.living_room_camera_move_up
            name: Up
            icon: mdi:arrow-up
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_up
            grid_options:
              columns: 3
              rows: 2

          # Row: [Left] [Calibrate] [Right]
          - type: button
            entity: button.living_room_camera_move_left
            name: Left
            icon: mdi:arrow-left
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_left
            grid_options:
              columns: 3

          - type: button
            entity: button.living_room_camera_calibrate
            name: Calibrate
            icon: mdi:crosshairs-gps
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_calibrate
            grid_options:
              columns: 3

          - type: button
            entity: button.living_room_camera_move_right
            name: Right
            icon: mdi:arrow-right
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_right
            grid_options:
              columns: 3

          # Row: [empty] [Down] [empty] [empty]
          - type: button
            entity: button.living_room_camera_move_down
            name: Down
            icon: mdi:arrow-down
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_down
            grid_options:
              columns: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Garage — TP-Link Tapo C310 (fixed, outdoor)
  # ─────────────────────────────────────────────────────────────────────────────
  - title: Garage
    path: garage
    type: sections
    icon: mdi:garage
    max_columns: 4
    sections:
      # Live stream
      - type: grid
        cards:
          - type: heading
            heading: Outdoor Camera
            heading_style: title
            icon: mdi:cctv

          - type: picture-entity
            entity: camera.outdoor_camera_hd_stream
            camera_view: live
            show_name: false
            show_state: false
            grid_options:
              columns: full

      # Detections & controls
      - type: grid
        title: Sensors & Controls
        cards:
          - type: heading
            heading: Detections
            heading_style: subtitle
            icon: mdi:motion-sensor

          - type: tile
            entity: binary_sensor.outdoor_camera_person_detection
            name: Person
            icon: mdi:account
            grid_options:
              columns: 4

          - type: tile
            entity: binary_sensor.outdoor_camera_cell_motion_detection
            name: Motion
            icon: mdi:run
            grid_options:
              columns: 4

          - type: tile
            entity: binary_sensor.outdoor_camera_noise
            name: Sound
            icon: mdi:volume-high
            grid_options:
              columns: 4

          - type: heading
            heading: Controls
            heading_style: subtitle
            icon: mdi:tune

          - type: tile
            entity: switch.outdoor_camera_privacy
            name: Privacy
            icon: mdi:eye-off
            grid_options:
              columns: 6

          - type: tile
            entity: light.outdoor_camera_floodlight_timed
            name: Floodlight
            icon: mdi:spotlight-beam
            grid_options:
              columns: 6
