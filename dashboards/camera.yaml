views:
  # ─────────────────────────────────────────────────────────────────────────────
  # Living Room — TP-Link Tapo C210 (pan/tilt)
  # ─────────────────────────────────────────────────────────────────────────────
  - title: Living Room
    path: living-room
    type: sections
    icon: mdi:sofa
    max_columns: 4
    sections:
      # Live stream
      - type: grid
        cards:
          - type: heading
            heading: Living Room Camera
            heading_style: title
            icon: mdi:cctv

          - type: picture-entity
            entity: camera.living_room_camera_hd_stream
            camera_view: live
            show_name: false
            show_state: false
            grid_options:
              columns: full

      # Detection Settings
      - type: grid
        title: Detection Settings
        cards:
          - type: heading
            heading: Configure Detection
            heading_style: subtitle
            icon: mdi:tune

          - type: tile
            entity: select.living_room_camera_person_detection
            name: Person Detection
            icon: mdi:account-search
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_motion_detection
            name: Motion Detection
            icon: mdi:motion-sensor
            grid_options:
              columns: 6

          - type: tile
            entity: number.living_room_camera_motion_detection_digital_sensitivity
            name: Motion Sensitivity
            icon: mdi:gauge
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_tamper_detection
            name: Tamper Detection
            icon: mdi:shield-alert
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_automatic_alarm
            name: Automatic Alarm
            icon: mdi:bell-alert
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_baby_cry_detection
            name: Baby Cry Detection
            icon: mdi:baby-face-outline
            grid_options:
              columns: 6

      # Vision & Audio
      - type: grid
        title: Vision & Audio
        cards:
          - type: heading
            heading: Camera Settings
            heading_style: subtitle
            icon: mdi:camera-metering-center

          - type: tile
            entity: select.living_room_camera_night_vision
            name: Night Vision
            icon: mdi:moon-waning-crescent
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_night_vision_switching
            name: Auto Night Mode
            icon: mdi:brightness-auto
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_light_frequency
            name: Light Frequency
            icon: mdi:flash
            grid_options:
              columns: 6

          - type: tile
            entity: binary_sensor.living_room_camera_noise
            name: Sound Detection
            icon: mdi:volume-high
            grid_options:
              columns: 6

          - type: tile
            entity: number.living_room_camera_microphone_volume
            name: Mic Volume
            icon: mdi:microphone
            grid_options:
              columns: 6

          - type: tile
            entity: number.living_room_camera_speaker_volume
            name: Speaker Volume
            icon: mdi:volume-high
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_microphone_mute
            name: Mute Microphone
            icon: mdi:microphone-off
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_microphone_noise_cancellation
            name: Noise Cancellation
            icon: mdi:noise-off
            grid_options:
              columns: 6

      # Lighting & Privacy
      - type: grid
        title: Lighting & Privacy
        cards:
          - type: tile
            entity: switch.living_room_camera_privacy
            name: Privacy Mode
            icon: mdi:eye-off
            grid_options:
              columns: 6

          - type: tile
            entity: light.living_room_camera_floodlight_timed
            name: Floodlight
            icon: mdi:spotlight-beam
            grid_options:
              columns: 6

          - type: tile
            entity: number.living_room_camera_spotlight_intensity
            name: Spotlight Intensity
            icon: mdi:brightness-6
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_spotlight_on_off_for
            name: Spotlight Timer
            icon: mdi:timer
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_privacy_zones
            name: Privacy Zones
            icon: mdi:zone
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_lens_distortion_correction
            name: Distortion Correction
            icon: mdi:lens
            grid_options:
              columns: 6

      # Recording & Storage
      - type: grid
        title: Recording & Storage
        cards:
          - type: tile
            entity: switch.living_room_camera_record_to_sd_card
            name: Record to SD Card
            icon: mdi:database
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_record_audio
            name: Record Audio
            icon: mdi:microphone-check
            grid_options:
              columns: 6

          - type: tile
            entity: sensor.living_room_camera_recordings_synchronization
            name: Cloud Sync Status
            icon: mdi:cloud-sync
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_media_sync
            name: Media Sync
            icon: mdi:sync
            grid_options:
              columns: 6

      # Pan & Tilt Controls
      - type: grid
        title: Pan & Tilt Controls
        cards:
          - type: heading
            heading: Camera Movement
            heading_style: subtitle
            icon: mdi:pan

          - type: button
            entity: button.living_room_camera_move_up
            name: Up
            icon: mdi:arrow-up
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_up
            grid_options:
              columns: 3
              rows: 2

          - type: button
            entity: button.living_room_camera_move_left
            name: Left
            icon: mdi:arrow-left
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_left
            grid_options:
              columns: 3

          - type: button
            entity: button.living_room_camera_calibrate
            name: Calibrate
            icon: mdi:crosshairs-gps
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_calibrate
            grid_options:
              columns: 3

          - type: button
            entity: button.living_room_camera_move_right
            name: Right
            icon: mdi:arrow-right
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_right
            grid_options:
              columns: 3

          - type: button
            entity: button.living_room_camera_move_down
            name: Down
            icon: mdi:arrow-down
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.living_room_camera_move_down
            grid_options:
              columns: 3

      # Network & System
      - type: grid
        title: Network & System
        cards:
          - type: tile
            entity: sensor.living_room_camera_rssi
            name: Signal Strength
            icon: mdi:wifi
            grid_options:
              columns: 6

          - type: tile
            entity: sensor.living_room_camera_network_ssid
            name: WiFi Network
            icon: mdi:network-wifi
            grid_options:
              columns: 6

          - type: tile
            entity: sensor.living_room_camera_link_type
            name: Link Type
            icon: mdi:ethernet
            grid_options:
              columns: 6

          - type: tile
            entity: sensor.living_room_camera_last_automatic_reboot_time
            name: Last Reboot
            icon: mdi:restart
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_automatic_reboot
            name: Auto Reboot
            icon: mdi:power-cycle
            grid_options:
              columns: 6

          - type: tile
            entity: select.living_room_camera_automatic_reboot_time
            name: Reboot Schedule
            icon: mdi:clock
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_automatically_upgrade_firmware
            name: Auto Upgrade
            icon: mdi:auto-upload
            grid_options:
              columns: 6

          - type: tile
            entity: switch.living_room_camera_indicator_led
            name: Indicator LED
            icon: mdi:led-on
            grid_options:
              columns: 6

