- id: '1738874992886'
  alias: Entryway Light with Sensor
  description: Turn on the entryway light when presence is detected by movement sensor
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.entryway_sensor_occupancy
    from:
    to: 'on'
  conditions: []
  actions:
  - alias: Turn on the light
    action: light.turn_on
    data:
      brightness_pct: 65
      color_temp_kelvin: 2800
    target:
      device_id: 6bac16f7fdf74d36935754a857235f0c
  - alias: Wait until there is no motion from device
    wait_for_trigger:
    - trigger: state
      entity_id:
      - binary_sensor.entryway_sensor_occupancy
      to: 'off'
    continue_on_timeout: true
  - alias: Wait the number of seconds that has been set
    delay:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
  - alias: Turn off the light
    action: light.turn_off
    data:
      transition: 4
    target:
      device_id: 6bac16f7fdf74d36935754a857235f0c
  mode: restart
  max_exceeded: silent
- id: '1739046619134'
  alias: Klikos collection notification
  description: Sends a notification at 16:00 if there's klikos to collect
  triggers:
  - at: '16:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: '{{ states(''sensor.afvalinfo_afval_trash_type_today'') != ''no''
      }}'
  actions:
  - data:
      message: "\U0001F519\U0001F5D1️ Collect Kliko: {{states('sensor.afvalinfo_afval_trash_type_tomorrow')
        }}\n"
    action: notify.send_message
  mode: single
