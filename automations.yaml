    trigger: time
  conditions:
  - condition: template
    value_template: '{{ states(''sensor.afvalinfo_afval_trash_type_today'') != ''no''
      }}'
  actions:
  - data:
      title: Trash Collection Reminder
      message: 'Bring klikos back: {{ states(''sensor.afvalinfo_afval_trash_type_today'')
        }}'
    action: notify.notify
  mode: single
