
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  dashboards:
    dashboard-camera:
      mode: yaml
      filename: dashboards/camera.yaml
      title: Cameras
      icon: mdi:cctv
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
    - 192.168.68.0/24

shell_command:
  git_pull: GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" git -C /config pull --ff-only

input_number:
  entryway_light_linger_minutes:
    name: Entryway Light – Linger after no motion (minutes)
    min: 0
    max: 30
    step: 0.5
    initial: 1
    unit_of_measurement: min
    icon: mdi:timer-outline
